<!DOCTYPE html>
<html>

<head>

<title>
Customer Search
</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link rel="stylesheet"
href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<div class="container mt-5">

<h1>

Customer Search

</h1>

<form method="GET">

<input
type="text"
name="customer_id"
class="form-control"
placeholder="Enter Customer ID">

<button
class="btn btn-primary mt-3">

Search

</button>

</form>

{% if customer %}

<div class="card mt-4">

<div class="card-body">

<h3>

Customer Details

</h3>

<ul>

{% for key,value in customer.items() %}

<li>

<b>{{ key }}</b> :
{{ value }}

</li>

{% endfor %}

</ul>

</div>

</div>

{% endif %}

</div>

</body>

</html>
